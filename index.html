<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Descent - Pro Movement Edition</title>
    <style>
        /* (Your existing CSS remains the same) */
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.85); pointer-events: auto; transition: opacity 0.3s ease; opacity: 0; visibility: hidden; z-index: 10; backdrop-filter: blur(5px); }
        .screen.active { opacity: 1; visibility: visible; }
        h1 { color: #fff; font-size: 3.5rem; margin-bottom: 10px; letter-spacing: 6px; font-weight: 300; text-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center;}
        h2 { color: #ccc; font-size: 1.5rem; margin-bottom: 30px; font-weight: 300; text-align: center; }
        .menu-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; gap: 25px; width: 90%; max-width: 420px; }
        .scores-panel { width: 100%; text-align: center; color: #aaa; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .scores-panel span { color: #fff; font-weight: bold; font-size: 1.3rem; margin-left: 10px;}
        .map-selector { width: 100%; }
        .map-selector label { color: #ccc; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 8px;}
        select { width: 100%; padding: 12px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #555; border-radius: 8px; font-size: 1.05rem; outline: none; cursor: pointer; transition: border 0.3s; }
        select:focus { border-color: #fff; }
        button { background: #fff; color: #000; border: none; padding: 18px 40px; font-size: 1.2rem; font-weight: 800; border-radius: 40px; cursor: pointer; transition: transform 0.15s, background 0.2s, box-shadow 0.2s; text-transform: uppercase; letter-spacing: 2px; width: 100%; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        button:hover { background: #e0e0e0; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,255,255,0.3); }
        button:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(255,255,255,0.2); }
        #hud { position: absolute; top: 25px; left: 30px; color: rgba(255, 255, 255, 0.9); font-size: 1.8rem; font-weight: bold; pointer-events: none; z-index: 5; text-shadow: 0 2px 6px rgba(0,0,0,0.7); display: none; letter-spacing: 1px; }
        #mobile-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; pointer-events: auto; z-index: 5; display: none; }
        .control-btn { width: 90px; height: 90px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: rgba(255, 255, 255, 0.6); font-size: 2.5rem; backdrop-filter: blur(8px); transition: background 0.1s, transform 0.1s; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .control-btn:active { background: rgba(255, 255, 255, 0.35); transform: scale(0.95); }
        @media (max-width: 768px) { .mobile-active #mobile-controls { display: flex; } h1 { font-size: 2.5rem; } .menu-box { padding: 25px; width: 85%; } }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud">Score: <span id="scoreValue">0</span></div>
        <div id="main-menu" class="screen active">
            <h1>DESCENT</h1>
            <div class="menu-box">
                <div class="scores-panel">High Score: <span id="menuHighScore">0</span><br><br>Last Score: <span id="menuLastScore">0</span></div>
                <div class="map-selector">
                    <label for="mapSelect">Select Map</label>
                    <select id="mapSelect">
                        <option value="0">Classic</option>
                        <option value="1">Neon</option>
                        <option value="2">Desert</option>
                        <option value="3">Abyss</option>
                    </select>
                </div>
                <button id="startBtn">Play</button>
            </div>
        </div>
        <div id="game-over" class="screen">
            <h1>YOU DIED</h1>
            <h2 id="deathReason">Fell into the void.</h2>
            <div class="menu-box">
                <div class="scores-panel">Score: <span id="overScore">0</span><br><br>High Score: <span id="overHighScore">0</span></div>
                <button id="restartBtn">Main Menu</button>
            </div>
        </div>
        <div id="mobile-controls">
            <div class="control-btn" id="btnLeft">◄</div>
            <div class="control-btn" id="btnRight">►</div>
        </div>
    </div>

<script>
// --- UTILITIES ---
const Utils = {
    saveScore: (score) => {
        let high = parseInt(localStorage.getItem('descentHighScore') || '0');
        if (score > high) localStorage.setItem('descentHighScore', score.toString());
        localStorage.setItem('descentLastScore', score.toString());
    },
    getScores: () => ({
        high: parseInt(localStorage.getItem('descentHighScore') || '0'),
        last: parseInt(localStorage.getItem('descentLastScore') || '0')
    }),
    hexToRgb: (hex) => {
        let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r:0,g:0,b:0};
    },
    lerpColor: (hex1, hex2, t) => {
        const c1 = Utils.hexToRgb(hex1);
        const c2 = Utils.hexToRgb(hex2);
        return `rgb(${Math.round(c1.r + (c2.r - c1.r) * t)},${Math.round(c1.g + (c2.g - c1.g) * t)},${Math.round(c1.b + (c2.b - c1.b) * t)})`;
    },
    clamp: (val, min, max) => Math.min(Math.max(val, min), max),
    randomRange: (min, max) => Math.random() * (max - min) + min
};

const THEMES = [
    { bg: ['#ffffff', '#a8a8a8', '#1a1a1a'], plat: ['#111111', '#880000', '#004411'], player: '#000000' },
    { bg: ['#050510', '#1a0033', '#000000'], plat: ['#00ffff', '#ff00ff', '#ffff00'], player: '#ffffff' },
    { bg: ['#f4e0c8', '#cc6600', '#4a1500'], plat: ['#8b4513', '#4a1500', '#000000'], player: '#2b1000' },
    { bg: ['#87ceeb', '#003366', '#000011'], plat: ['#ffffff', '#00aaaa', '#ff0044'], player: '#001133' }
];

class InputManager {
    constructor() {
        this.left = false; this.right = false; this.anyPressed = false;
        window.addEventListener('keydown', (e) => this.handleKey(e, true));
        window.addEventListener('keyup', (e) => this.handleKey(e, false));
        const touchStart = (dir) => (e) => { e.preventDefault(); this[dir] = true; this.anyPressed = true; };
        const touchEnd = (dir) => (e) => { e.preventDefault(); this[dir] = false; };
        document.getElementById('btnLeft').addEventListener('touchstart', touchStart('left'));
        document.getElementById('btnLeft').addEventListener('touchend', touchEnd('left'));
        document.getElementById('btnRight').addEventListener('touchstart', touchStart('right'));
        document.getElementById('btnRight').addEventListener('touchend', touchEnd('right'));
        if ('ontouchstart' in window) document.body.classList.add('mobile-active');
    }
    handleKey(e, isDown) {
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') { this.left = isDown; if(isDown) this.anyPressed = true; }
        if(e.code === 'ArrowRight' || e.code === 'KeyD') { this.right = isDown; if(isDown) this.anyPressed = true; }
    }
    reset() { this.left = false; this.right = false; this.anyPressed = false; }
}

// --- DYNAMIC PLAYER CLASS ---
class Player {
    constructor(x, y, theme) {
        this.x = x; this.y = y;
        this.width = 16; this.height = 42;
        this.vx = 0; this.vy = 0;
        
        // --- PRO PHYSICS SETTINGS ---
        this.maxSpeed = 550;        // Increased top speed
        this.accel = 12;            // Sharpness of reaching max speed
        this.friction = 8;          // Sharpness of stopping
        this.gravity = 1600;
        this.lean = 0;              // Visual dynamic tilt
        
        this.isGrounded = false;
        this.animPhase = 0;
        this.color = theme.player;
    }

    update(dt, input, platforms) {
        // 1. Exponential Horizontal Movement
        let targetVx = 0;
        if (input.left) targetVx = -this.maxSpeed;
        if (input.right) targetVx = this.maxSpeed;

        // Apply Lerp for exponential feel: Current + (Target - Current) * Factor * dt
        let lerpFactor = targetVx === 0 ? this.friction : this.accel;
        this.vx += (targetVx - this.vx) * lerpFactor * dt;

        // 2. Vertical Physics
        this.vy += this.gravity * dt;
        let nextY = this.y + this.vy * dt;
        let nextX = this.x + this.vx * dt;

        // Visual Lean (Dynamic)
        this.lean += ((this.vx * 0.001) - this.lean) * 10 * dt;

        // 3. Collision (Swept AABB)
        this.isGrounded = false;
        for (let p of platforms) {
            if (this.vy >= 0 && this.y + this.height <= p.y + 5 && nextY + this.height >= p.y) {
                let inHole = p.holes.some(h => nextX + 4 >= h.x && nextX + this.width - 4 <= h.x + h.w);
                if (!inHole) {
                    nextY = p.y - this.height;
                    this.vy = 0;
                    this.isGrounded = true;
                    break;
                }
            }
        }

        this.x = Utils.clamp(nextX, 0, Game.canvas.width - this.width);
        this.y = nextY;
        
        // Animation speed tied to actual velocity
        if (this.isGrounded) this.animPhase += Math.abs(this.vx) * dt * 0.03;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.width / 2, this.y);
        ctx.rotate(this.lean); // Dynamic lean based on speed
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3.5;
        ctx.lineCap = 'round';

        // Animated Stickman
        const swing = Math.sin(this.animPhase) * 0.8;
        ctx.beginPath();
        ctx.arc(0, 7, 7, 0, Math.PI * 2); // Head
        ctx.moveTo(0, 14); ctx.lineTo(0, 30); // Body
        // Legs
        ctx.moveTo(0, 30); ctx.lineTo(Math.sin(swing)*15, 42);
        ctx.moveTo(0, 30); ctx.lineTo(Math.sin(-swing)*15, 42);
        // Arms
        ctx.moveTo(0, 18); ctx.lineTo(Math.sin(-swing)*12, 28);
        ctx.moveTo(0, 18); ctx.lineTo(Math.sin(swing)*12, 28);
        ctx.stroke();
        ctx.restore();
    }
}

class Platform {
    constructor(y, diff, px) {
        this.y = y; this.height = 12; this.marked = false; this.scored = false;
        let hw = Utils.randomRange(45, 90 - (diff * 20));
        let hx = Utils.randomRange(10, Game.canvas.width - hw - 10);
        this.holes = [{ x: hx, w: hw }];
    }
    update(dt, speed) { this.y -= speed * dt; if (this.y < -50) this.marked = true; }
    draw(ctx, color) {
        ctx.fillStyle = color;
        let h = this.holes[0];
        ctx.fillRect(0, this.y, h.x, this.height);
        ctx.fillRect(h.x + h.w, this.y, Game.canvas.width - (h.x + h.w), this.height);
    }
}

const Game = {
    init() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.input = new InputManager();
        this.state = 'MENU';
        window.addEventListener('resize', () => { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; });
        this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight;
        document.getElementById('startBtn').onclick = () => this.start();
        document.getElementById('restartBtn').onclick = () => location.reload();
        requestAnimationFrame((t) => this.loop(t));
    },
    start() {
        this.themeId = document.getElementById('mapSelect').value;
        this.theme = THEMES[this.themeId];
        this.player = new Player(this.canvas.width/2, 100, this.theme);
        this.platforms = [new Platform(400, 0, 0)];
        this.score = 0;
        this.difficulty = 0;
        this.state = 'PLAYING';
        document.getElementById('main-menu').classList.remove('active');
        document.getElementById('hud').style.display = 'block';
    },
    loop(t) {
        let dt = Math.min((t - (this.lastTime || t)) / 1000, 0.05);
        this.lastTime = t;
        this.ctx.fillStyle = this.theme ? this.theme.bg[0] : '#000';
        this.ctx.fillRect(0,0,this.canvas.width, this.canvas.height);

        if (this.state === 'PLAYING') {
            this.difficulty += dt * 0.02;
            let speed = 120 + (this.difficulty * 100);
            
            this.player.update(dt, this.input, this.platforms);
            this.platforms.forEach(p => {
                p.update(dt, speed);
                if (!p.scored && this.player.y > p.y) { this.score++; p.scored = true; document.getElementById('scoreValue').innerText = this.score; }
            });

            if (this.platforms[this.platforms.length-1].y < this.canvas.height - 150) {
                this.platforms.push(new Platform(this.canvas.height, this.difficulty));
            }
            this.platforms = this.platforms.filter(p => !p.marked);

            this.platforms.forEach(p => p.draw(this.ctx, this.theme.plat[0]));
            this.player.draw(this.ctx);

            if (this.player.y < -50 || this.player.y > this.canvas.height + 50) this.state = 'GAMEOVER';
        } else if (this.state === 'GAMEOVER') {
            document.getElementById('game-over').classList.add('active');
            document.getElementById('overScore').innerText = this.score;
        }
        requestAnimationFrame((t) => this.loop(t));
    }
};

Game.init();
</script>
</body>
</html>
